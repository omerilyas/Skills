name: validate-skills

on:
  pull_request:
    paths:
      - "skills/**"
      - "registry.json"
      - "scripts/**"
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm run validate
